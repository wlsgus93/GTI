services:
  postgres:
    image: postgres:16-alpine
    container_name: gti-postgres
    environment:
      POSTGRES_DB: gti
      POSTGRES_USER: gti
      POSTGRES_PASSWORD: gti
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gti -d gti"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gti-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # 비공식 데이터 소스 크롤러 (Google Play / SteamDB W7+)
  # 별도 Node.js 컨테이너 — Spring 본체와 ToS / Cloudflare 위험 격리
  crawler-service:
    build:
      context: ../crawler-service
      dockerfile: Dockerfile
    container_name: gti-crawler
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
